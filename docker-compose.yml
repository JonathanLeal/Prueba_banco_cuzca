version: '3.8'

services:
  # Base de Datos
  postgres-db:
    image: postgres:15-alpine
    container_name: cuzca-postgres-db
    environment:
      POSTGRES_DB: bancoCuzca
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin 
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cuzca-network

  # API Spring Boot
  api-service:
    build: .
    container_name: cuzca-springboot-api
    ports:
      - "8084:8084"
    depends_on:
      - postgres-db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/bancoCuzca
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=admin
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      # para jwt
      - JWT_SECRET=MiClaveSecretaSuperSeguraParaElBanco2026!#
      - JWT_EXPIRATION=86400000
      - JWT_PREFIX=Bearer
      - JWT_HEADER=Authorization
    networks:
      - cuzca-network

volumes:
  postgres_data:

networks:
  cuzca-network:
    driver: bridge